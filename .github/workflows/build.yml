name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Find CustomTkinter path
        id: ctk
        shell: bash
        run: |
          CTK_PATH=$(python -c "import customtkinter; import os; print(os.path.dirname(customtkinter.__file__))")
          echo "path=$CTK_PATH" >> $GITHUB_OUTPUT

      - name: Download megatools for Windows
        shell: bash
        run: |
          mkdir -p megatools
          BASE="https://github.com/nickvdp/megatools-binaries/raw/master/megatools-1.10.3-win32"
          for tool in megareg megadf megals megacopy megamkdir megarm megadl megaget megaput; do
            curl -sL "$BASE/$tool.exe" -o "megatools/$tool.exe"
          done
          echo "Downloaded megatools:"
          ls megatools/

      - name: Build EXE
        run: |
          python -m PyInstaller --noconsole --onefile `
            --add-data "${{ steps.ctk.outputs.path }};customtkinter/" `
            --add-data "logo.ico;." `
            --add-data "logo.png;." `
            --add-data "megatools;megatools" `
            --hidden-import "PIL._tkinter_finder" `
            --hidden-import "babel.numbers" `
            --hidden-import "openpyxl" `
            --hidden-import "openpyxl.cell._writer" `
            --hidden-import "openpyxl.workbook._writer" `
            --hidden-import "openpyxl.worksheet._writer" `
            --hidden-import "PIL" `
            --hidden-import "requests" `
            --hidden-import "colorama" `
            --hidden-import "tqdm" `
            --hidden-import "faker" `
            --hidden-import "faker.providers" `
            --icon "logo.ico" `
            --name "MEGA-Generator" `
            gui.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: MEGA-Generator
          path: dist/MEGA-Generator.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0
          name: MEGA Account Generator v2.0
          body: |
            ## What's New
            - Bundled megatools (no extra install needed)
            - Multi-account Webshare proxy rotation (10 free proxies per account)
            - Direct mail.tm API (replaces buggy pymailtm)
            - CSV import support
            - Linux build script
            - Improved keep-alive
            - Thread-safe CSV
            
            ## Usage
            1. Download MEGA-Generator.exe
            2. Run it — no Python or megatools install needed
            3. Enter accounts count, password, click Generate
          files: dist/MEGA-Generator.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
